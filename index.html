<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — School Management SaaS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:240px;background:#0f172a;display:flex;flex-direction:column;flex-shrink:0;height:100vh}
.sb-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-logo-ic{width:34px;height:34px;background:#6366f1;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-txt{color:#fff;font-weight:800;font-size:16px;letter-spacing:-.3px}
.sb-logo-sub{color:rgba(255,255,255,.3);font-size:10px;margin-top:1px}
.sb-school{margin:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px}
.sb-school-name{color:#fff;font-size:12px;font-weight:600}
.sb-school-term{color:rgba(255,255,255,.35);font-size:10px;margin-top:2px}
.sb-nav{flex:1;padding:6px 10px;overflow-y:auto}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:.1em;padding:10px 8px 5px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;color:rgba(255,255,255,.45);font-size:13px;font-weight:500;transition:all .15s;border:none;background:transparent;font-family:inherit}
.nav-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.nav-btn.active{background:#6366f1;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.nav-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(255,255,255,.12);margin-left:auto}
.nav-btn.active .nav-badge{background:rgba(255,255,255,.22)}
.sb-bottom{padding:10px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;cursor:pointer}
.sb-user:hover{background:rgba(255,255,255,.05)}
.sb-user-name{color:#fff;font-size:12px;font-weight:600}
.sb-user-role{color:rgba(255,255,255,.3);font-size:10px;margin-top:1px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #f1f5f9;height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:800;color:#0f172a;letter-spacing:-.3px}
.topbar-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.search{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:7px 12px;width:220px}
.search input{background:none;border:none;outline:none;font-size:13px;color:#0f172a;font-family:inherit;width:100%}
.search input::placeholder{color:#94a3b8}
.icon-btn{width:36px;height:36px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background .15s}
.icon-btn:hover{background:#f1f5f9}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:2px solid #fff}
.logout-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;cursor:pointer;font-weight:500;font-family:inherit;background:none;border:none;transition:color .15s}
.logout-btn:hover{color:#ef4444}
.content{flex:1;overflow-y:auto;padding:24px}
.role-bar{background:#eef2ff;border-bottom:1px solid #c7d2fe;padding:6px 24px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.role-bar-label{font-size:11px;color:#4338ca;font-weight:600}
.role-chip{padding:3px 12px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:inherit;transition:all .15s}
.card{background:#fff;border:1px solid #f1f5f9;border-radius:16px;overflow:hidden}
.card-body{padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0}
.card-title{font-size:14px;font-weight:700;color:#0f172a}
.card-action{font-size:12px;color:#6366f1;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #f1f5f9;border-radius:16px;padding:18px;cursor:pointer;transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden}
.stat-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.07);transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.indigo::before{background:#6366f1}
.stat-card.emerald::before{background:#22c97a}
.stat-card.amber::before{background:#f59e0b}
.stat-card.violet::before{background:#8b5cf6}
.stat-card.red::before{background:#ef4444}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.stat-value{font-size:28px;font-weight:800;color:#0f172a;letter-spacing:-.5px;line-height:1;margin-bottom:4px}
.stat-label{font-size:12px;color:#94a3b8;margin-bottom:8px}
.stat-change{font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px}
.stat-change.up{color:#16a34a}.stat-change.dn{color:#ef4444}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.badge.success{background:#dcfce7;color:#16a34a}
.badge.warning{background:#fef9c3;color:#a16207}
.badge.danger{background:#fee2e2;color:#dc2626}
.badge.info{background:#dbeafe;color:#1d4ed8}
.badge.brand{background:#ede9fe;color:#6d28d9}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;padding:0 16px 12px;text-align:left;border-bottom:1px solid #f1f5f9}
.tbl td{padding:12px 16px;border-bottom:1px solid #fafafa;font-size:13px;color:#334155;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.av-row{display:flex;align-items:center;gap:10px}
.av-name{font-size:13px;font-weight:600;color:#0f172a}
.av-sub{font-size:11px;color:#94a3b8;font-family:'DM Mono',monospace}
.prog-wrap{margin-bottom:12px}
.prog-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.prog-label{font-weight:600;color:#334155}
.prog-pct{font-weight:700;color:#0f172a}
.prog-track{height:6px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px}
.event-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.event-date{width:40px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.event-day{font-size:18px;font-weight:800;color:#fff;line-height:1}
.event-month{font-size:9px;color:rgba(255,255,255,.7);text-transform:uppercase;font-weight:600;margin-top:1px}
.event-title{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:2px}
.event-meta{font-size:11px;color:#94a3b8}
.ai-wrap{display:flex;gap:16px;height:calc(100vh - 180px)}
.ai-sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.ai-chat{flex:1;display:flex;flex-direction:column;background:#fff;border:1px solid #f1f5f9;border-radius:16px;overflow:hidden}
.ai-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg-ai{display:flex;gap:8px;align-items:flex-start}
.msg-ai-bubble{background:#f1f5f9;border-radius:14px 14px 14px 2px;padding:10px 14px;font-size:13px;color:#334155;line-height:1.6;max-width:85%}
.msg-user{display:flex;justify-content:flex-end}
.msg-user-bubble{background:#6366f1;border-radius:14px 14px 2px 14px;padding:10px 14px;font-size:13px;color:#fff;line-height:1.6;max-width:85%}
.ai-input{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #f1f5f9}
.ai-input input{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:inherit}
.ai-send{width:40px;height:40px;background:#6366f1;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.ai-send:hover{background:#4f46e5}
.msg-wrap{display:flex;gap:16px;height:calc(100vh - 180px)}
.msg-list-panel{width:280px;flex-shrink:0;background:#fff;border:1px solid #f1f5f9;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.msg-search{padding:14px;border-bottom:1px solid #f8fafc}
.msg-list{overflow-y:auto;flex:1}
.msg-item{display:flex;gap:10px;align-items:start;padding:14px;cursor:pointer;border-bottom:1px solid #fafafa;transition:background .12s}
.msg-item:hover,.msg-item.active{background:#f0f0ff}
.msg-item-name{font-size:13px;font-weight:600;color:#0f172a}
.msg-item-role{font-size:10px;color:#94a3b8;margin-bottom:2px}
.msg-item-last{font-size:12px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-item-time{font-size:10px;color:#94a3b8;flex-shrink:0;margin-left:auto}
.msg-unread{width:18px;height:18px;background:#6366f1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;flex-shrink:0;margin-top:2px}
.chat-panel{flex:1;background:#fff;border:1px solid #f1f5f9;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.chat-header{padding:14px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px}
.chat-header-name{font-size:14px;font-weight:700;color:#0f172a}
.chat-header-role{font-size:11px;color:#94a3b8}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-input{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #f1f5f9}
.chat-input input{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:inherit}
.ann-item{padding:16px;border-left:4px solid #6366f1;background:#f8fafc;border-radius:0 12px 12px 0;margin-bottom:12px}
.ann-item.urgent{border-left-color:#ef4444;background:#fff5f5}
.ann-item.info{border-left-color:#f59e0b;background:#fffbeb}
.ann-title{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:4px}
.ann-body{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:8px}
.ann-meta{font-size:11px;color:#94a3b8;display:flex;gap:12px}
.tt-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:#f8fafc;margin-bottom:6px}
.tt-bar{width:3px;height:40px;border-radius:99px;flex-shrink:0}
.tt-subject{font-size:13px;font-weight:700;color:#0f172a}
.tt-info{font-size:11px;color:#94a3b8}
.tt-time{font-size:12px;font-weight:700;color:#64748b;margin-left:auto}
.ring-wrap{position:relative;width:130px;height:130px;flex-shrink:0}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-size:26px;font-weight:800;color:#0f172a;line-height:1}
.ring-sub{font-size:11px;color:#94a3b8}
.fee-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff5f5;border-radius:12px;border:1px solid #fecaca;margin-bottom:8px}
.fee-ov{font-size:13px;font-weight:700;color:#dc2626}
.fee-days{font-size:11px;color:#94a3b8}
.qp-btn{display:block;width:100%;text-align:left;font-size:12px;color:#64748b;padding:7px 10px;border-radius:8px;border:none;background:none;cursor:pointer;font-family:inherit;transition:all .12s;line-height:1.4}
.qp-btn:hover{background:#f0f0ff;color:#6366f1}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .3s ease}
.profile-card{background:#fff;border:1px solid #f1f5f9;border-radius:16px;padding:24px;max-width:640px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.form-input{width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:inherit;color:#0f172a;transition:border-color .15s}
.form-input:focus{border-color:#6366f1}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.parent-hero{background:linear-gradient(135deg,#4f46e5,#6366f1);border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useRef} = React;
const {AreaChart,Area,BarChart,Bar,LineChart,Line,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer} = Recharts;

const C8=['#6366f1','#22c97a','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#10b981'];
const GF=['Abena','Kwame','Ama','Kofi','Yaa','Akosua','Kweku','Efua','Nana','Esi','Yaw','Adwoa','Kojo','Afia','Akua','Samuel','Grace','Emmanuel','Nii','Akwasi'];
const GL=['Mensah','Asante','Owusu','Boateng','Amponsah','Agyeman','Darko','Frimpong','Amoah','Osei','Tetteh','Kyei','Antwi','Koomson','Quaye','Barimah','Afriyie','Appiah','Acheampong','Oduro'];
const CLS=['Form 1A','Form 1B','Form 2A','Form 2B','Form 3A','Form 3B'];
const SUBS=['Mathematics','English Language','Integrated Science','Social Studies','ICT','French','History','Biology','Chemistry','Physics'];
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[rnd(0,a.length-1)];
const fullName=()=>pick(GF)+' '+pick(GL);

const STUDS=Array.from({length:50},(_,i)=>({id:'STU-'+String(i+1).padStart(4,'0'),name:fullName(),cls:pick(CLS),age:rnd(13,18),att:rnd(72,99),gpa:(rnd(55,98)/10).toFixed(1),fees:pick(['Paid','Paid','Paid','Partial','Overdue']),color:C8[i%8]}));
const TCHS=Array.from({length:15},(_,i)=>({id:'TCH-'+String(i+1).padStart(3,'0'),name:fullName(),subj:SUBS[i%SUBS.length],classes:[pick(CLS),pick(CLS)].filter((v,j,a)=>a.indexOf(v)===j),students:rnd(40,60),rating:(rnd(40,50)/10).toFixed(1),status:'Active',color:C8[i%8]}));

const MREV=[{m:'Jan',rev:42,users:1240},{m:'Feb',rev:48,users:1380},{m:'Mar',rev:51,users:1490},{m:'Apr',rev:55,users:1620},{m:'May',rev:61,users:1810},{m:'Jun',rev:67,users:2050}];
const ATT_W=[{d:'Mon',p:810,a:37,l:32},{d:'Tue',p:795,a:52,l:22},{d:'Wed',p:773,a:42,l:54},{d:'Thu',p:820,a:27,l:22},{d:'Fri',p:800,a:47,l:22}];
const FEES=[{m:'Jan',c:82,o:18},{m:'Feb',c:91,o:12},{m:'Mar',c:87,o:15},{m:'Apr',c:95,o:9},{m:'May',c:102,o:6},{m:'Jun',c:98,o:8}];
const SP=SUBS.slice(0,6).map(s=>({s:s.split(' ')[0],avg:rnd(65,92),pass:rnd(78,97)}));
const TS={borderRadius:10,border:'none',boxShadow:'0 4px 16px rgba(0,0,0,.08)',fontSize:12};

const ROLES=[{id:'superadmin',label:'Super Admin',color:'#7c3aed'},{id:'admin',label:'School Admin',color:'#4f46e5'},{id:'teacher',label:'Teacher',color:'#16a34a'},{id:'student',label:'Student',color:'#f59e0b'},{id:'parent',label:'Parent',color:'#8b5cf6'}];
const NAV={
  superadmin:[{icon:'layout-dashboard',label:'Dashboard',id:'dashboard'},{icon:'building-2',label:'Schools',id:'schools'},{icon:'users',label:'Users',id:'users'},{icon:'credit-card',label:'Revenue',id:'revenue'}],
  admin:[{icon:'layout-dashboard',label:'Dashboard',id:'dashboard'},{icon:'users',label:'Students',id:'students',badge:847},{icon:'user-check',label:'Teachers',id:'teachers'},{icon:'calendar-check',label:'Attendance',id:'attendance'},{icon:'credit-card',label:'Fees',id:'fees'}],
  teacher:[{icon:'layout-dashboard',label:'Dashboard',id:'dashboard'},{icon:'users',label:'My Students',id:'students'},{icon:'calendar-check',label:'Attendance',id:'attendance'},{icon:'file-plus',label:'Grades',id:'grades'}],
  student:[{icon:'layout-dashboard',label:'Dashboard',id:'dashboard'},{icon:'calendar',label:'Timetable',id:'timetable'},{icon:'file-text',label:'Assignments',id:'assignments'},{icon:'award',label:'My Results',id:'results'}],
  parent:[{icon:'layout-dashboard',label:'Dashboard',id:'dashboard'},{icon:'calendar-check',label:'Attendance',id:'attendance'},{icon:'award',label:'Reports',id:'reports'},{icon:'credit-card',label:'Fees',id:'fees'}]
};
const UNAMES={superadmin:'Alex Morgan',admin:'Prince Payne',teacher:'Mr. Kofi Asante',student:'Abena Kyei',parent:'Mrs. Adwoa Kyei'};
const UTITLES={superadmin:'Super Admin',admin:'School Administrator',teacher:'Mathematics Teacher',student:'Form 3A · Student',parent:"Parent — Abena Kyei"};

function Av({name,color,size=32}){
  const i=(name||'?').split(' ').map(w=>w[0]).slice(0,2).join('');
  return h('div',{className:'av',style:{width:size,height:size,fontSize:size*.35,background:color||'#6366f1'}},i);
}
function Badge({children,v='brand'}){return h('span',{className:'badge '+v},children);}
function Card({children,style}){return h('div',{className:'card',style},children);}
function CardHeader({title,action}){return h('div',{className:'card-header'},h('span',{className:'card-title'},title),action&&h('button',{className:'card-action'},action));}

function LI({name,size=16,color='currentColor'}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current||!window.lucide)return;
    ref.current.innerHTML='';
    const key=name.split('-').map((w,i)=>i?w[0].toUpperCase()+w.slice(1):w).join('');
    const fn=window.lucide[key]||window.lucide.Circle;
    const el=window.lucide.createElement(fn);
    el.setAttribute('width',size);el.setAttribute('height',size);el.setAttribute('stroke',color);
    ref.current.appendChild(el);
  },[name,size,color]);
  return h('span',{ref,style:{display:'inline-flex',alignItems:'center',justifyContent:'center'}});
}

function Sidebar({role,page,setPage}){
  const items=NAV[role]||[];
  return h('div',{className:'sb'},
    h('div',{className:'sb-logo'},
      h('div',{className:'sb-logo-ic'},h(LI,{name:'graduation-cap',size:18,color:'#fff'})),
      h('div',null,h('div',{className:'sb-logo-txt'},'EduTrack'),h('div',{className:'sb-logo-sub'},'School Management'))
    ),
    h('div',{className:'sb-school'},h('div',{className:'sb-school-name'},'Accra Academy'),h('div',{className:'sb-school-term'},'2025/2026 · Term 3')),
    h('nav',{className:'sb-nav'},
      h('div',{className:'sb-section'},'Menu'),
      ...items.map(it=>h('button',{key:it.id,className:'nav-btn'+(page===it.id?' active':''),onClick:()=>setPage(it.id)},
        h(LI,{name:it.icon,size:15,color:page===it.id?'#fff':'rgba(255,255,255,.45)'}),
        h('span',{style:{flex:1}},it.label),
        it.badge&&h('span',{className:'nav-badge'},it.badge)
      ))
    ),
    h('div',{className:'sb-bottom'},
      h('div',{className:'sb-user'},
        h(Av,{name:UNAMES[role],color:'#6366f1',size:30}),

function App(){
  const[role,setRole]=useState('admin');
  const[page,setPage]=useState('dashboard');

  function renderPage(){
    switch(page){
      case 'dashboard':return role==='admin'?h(AdminDash,{setPage}):role==='student'?h(StudentDash):h(BlankPage,{title:'Dashboard'});
      case 'students':return h(StudentsPage);
      default:return h(BlankPage,{title:page.charAt(0).toUpperCase()+page.slice(1)});
    }
  }

  return h('div',{className:'app'},
    h(Sidebar,{role,page,setPage}),
    h('div',{className:'main'},
      h('div',{className:'role-bar'},
        h('span',{className:'role-bar-label'},'Switch role:'),
        ROLES.map(r=>h('button',{key:r.id,className:'role-chip',onClick:()=>{setRole(r.id);setPage('dashboard');},style:{background:role===r.id?r.color:'transparent',color:role===r.id?'#fff':r.color,border:'1px solid '+(role===r.id?r.color:'transparent')}},' '+r.label+' '))
      ),
      h(Topbar,{page,onLogout:()=>alert('Logged out!')}),
      h('div',{className:'content'},renderPage())
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
